# ============================================================
# class-orchestrator 应用配置
# 详见 services/class-orchestrator/README.md
# ============================================================
spring:
  application:
    name: class-orchestrator
  profiles:
    active: "@spring.profiles.active@"
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX

  # ========== MySQL ==========
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:digital_teacher}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      max-lifetime: 1800000

  # ========== Redis (单机或 Cluster 通过 Redisson 配置) ==========
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 3000ms

  # ========== Kafka ==========
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: "1"
      retries: 3
      properties:
        linger.ms: 20
        compression.type: lz4
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: class-orchestrator-v1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.wandou.orchestrator.*
        session.timeout.ms: 10000
      auto-offset-reset: latest
      enable-auto-commit: false

# ========== MyBatis-Plus ==========
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-not-delete-value: "null"

# ========== Server ==========
server:
  port: 8081
  tomcat:
    threads:
      max: 200
    connection-timeout: 5000

# ========== Actuator ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ========== OpenAPI ==========
springdoc:
  api-docs:
    path: /api/v1/docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ========== 业务配置 ==========
app:
  agora:
    app-id: ${AGORA_APP_ID:}
    app-certificate: ${AGORA_APP_CERT:}
    token-ttl-seconds: 7200
  class:
    warmup-minutes: 15
    default-duration-minutes: 40
    max-students-per-class: 6
  takeover:
    lock-wait-seconds: 3
    lock-lease-seconds: 30
    target-effective-ms: 3000

# ========== 日志 ==========
logging:
  level:
    root: INFO
    com.wandou.orchestrator: DEBUG
    org.springframework.kafka: INFO
    org.mybatis: INFO
