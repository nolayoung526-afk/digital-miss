spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

wandou:
  adapter:
    avatar: mock
    voice: mock

logging:
  level:
    com.wandou: DEBUG
