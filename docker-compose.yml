# ============================================================
# 豌豆思维数字人老师 · 全量开发环境
# 一键启动:docker compose up -d
# 关停:      docker compose down
# 清净:      docker compose down -v   (⚠️ 会清数据)
# ============================================================
name: digital-teacher

services:

  # ---------------------- 基础设施 ----------------------
  mysql:
    image: mysql:8.4
    container_name: dt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: digital_teacher
      TZ: Asia/Shanghai
    ports: ["3306:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: dt-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.8
    container_name: dt-kafka
    restart: unless-stopped
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dt-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka: { condition: service_healthy }
    ports: ["8088:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ---------------------- 业务服务(可选启动)----------------------
  # 使用 profile 控制,默认只起基础设施
  #   docker compose --profile app up -d    启动全部业务
  #   docker compose up -d                   仅基础设施

  class-orchestrator:
    build: ./services/class-orchestrator
    container_name: dt-orchestrator
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    ports: ["8081:8081"]
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      AGORA_APP_ID: ${AGORA_APP_ID:-mock_app}
      SPRING_PROFILES_ACTIVE: dev

  fallback-executor:
    build: ./services/fallback-executor
    container_name: dt-fallback
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    ports: ["8082:8082"]
    environment:
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      SPRING_PROFILES_ACTIVE: dev

  strategy-engine:
    build: ./services/strategy-engine
    container_name: dt-strategy
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8083:8083"]
    environment:
      APP_REDIS_URL: redis://redis:6379/0
      APP_RULES_PATH: /app/rules

  digital-teacher-render:
    build: ./services/digital-teacher-render
    container_name: dt-render
    restart: unless-stopped
    profiles: ["app"]
    depends_on:
      redis: { condition: service_healthy }
    ports: ["8084:8084"]
    environment:
      APP_REDIS_URL: redis://redis:6379/0
      APP_AGORA_APP_ID: ${AGORA_APP_ID:-}
    # 正式 GPU 部署需 K8s · 此处 CPU mock 模式

  # ---------------------- 前端(只构建,通常本地 pnpm dev)----------------------
  # 前端开发习惯本地跑 pnpm dev 热更新,此处仅提供生产构建/预览

volumes:
  mysql-data:
  redis-data:

# ============================================================
# 常用命令
# ------------------------------------------------------------
# 只起基础设施(开发时最常用):
#   docker compose up -d
#
# 起全部服务(含 Java/Python 业务):
#   docker compose --profile app up -d
#
# 查看日志:
#   docker compose logs -f <service>
#
# 重建某服务:
#   docker compose build class-orchestrator && docker compose up -d class-orchestrator
# ============================================================
